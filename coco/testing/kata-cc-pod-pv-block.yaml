apiVersion: v1
kind: Pod
metadata:
  annotations:
    io.katacontainers.config.hypervisor.default_memory: "8192"
  labels:
    app: baseline
  name: baseline
  namespace: default
spec:
  containers:
  - args:
    - |
      set -e
      mkdir -p /mnt/storage
      mount /dev/block-device /mnt/storage
      /hello-openshift
    command:
    - /bin/sh
    - -c
    image: quay.io/openshift/origin-hello-openshift
    imagePullPolicy: Always
    name: hello-openshift
    ports:
    - containerPort: 8888
      protocol: TCP
    resources: {}
    securityContext:
      privileged: true
      runAsUser: 0
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    volumeDevices:
    - devicePath: /dev/block-device
      name: csi-block
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: kube-api-access-nxbpf
      readOnly: true
  dnsPolicy: ClusterFirst
  enableServiceLinks: true
  initContainers:
  - args:
    - |
      set -e
      mkdir -p /mnt/storage
      dnf install -y cryptsetup xfsprogs e2fsprogs # this is a nasty hack
      if ! blkid /dev/block-device; then
        echo "creating block device"
        mkfs.xfs /dev/block-device
      fi
    command:
    - /bin/sh
    - -c
    image: quay.io/centos/centos:stream9
    imagePullPolicy: IfNotPresent
    name: format-disk
    resources: {}
    securityContext:
      privileged: true
    terminationMessagePath: /dev/termination-log
    terminationMessagePolicy: File
    volumeDevices:
    - devicePath: /dev/block-device
      name: csi-block
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      name: kube-api-access-nxbpf
      readOnly: true
  nodeName: virtlab2410.virt.eng.rdu2.dc.redhat.com
  nodeSelector:
    node-role.kubernetes.io/master: ""
  overhead:
    cpu: 250m
    memory: 350Mi
    tdx.intel.com/keys: "1"
  preemptionPolicy: PreemptLowerPriority
  priority: 0
  restartPolicy: Always
  runtimeClassName: kata-cc
  schedulerName: default-scheduler
  securityContext: {}
  serviceAccount: default
  serviceAccountName: default
  terminationGracePeriodSeconds: 30
  tolerations:
  - effect: NoExecute
    key: node.kubernetes.io/not-ready
    operator: Exists
    tolerationSeconds: 300
  - effect: NoExecute
    key: node.kubernetes.io/unreachable
    operator: Exists
    tolerationSeconds: 300
  volumes:
  - name: csi-block
    persistentVolumeClaim:
      claimName: block-baseline
  - name: kube-api-access-nxbpf
    projected:
      defaultMode: 420
      sources:
      - serviceAccountToken:
          expirationSeconds: 3607
          path: token
      - configMap:
          items:
          - key: ca.crt
            path: ca.crt
          name: kube-root-ca.crt
      - downwardAPI:
          items:
          - fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
            path: namespace
      - configMap:
          items:
          - key: service-ca.crt
            path: service-ca.crt
          name: openshift-service-ca.crt
