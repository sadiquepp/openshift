- name: Setup Bastion Node (Connected)
  hosts: bastion
  gather_facts: false
  remote_user: "{{ admin_username }}"
  vars_files:
    - vars/common.yaml
    - "vars/{{ cloud_provider }}.yaml"
  tasks:

  - name: Wait for SSH banners
    wait_for_connection:
      delay: 5
      timeout: 300

  - name: Install Required RPM Packages
    dnf:
      name: "{{ common_packages + cloud_extra_packages }}"
      state: present
    become: true

  - name: Cloud-specific setup (CLI, credentials, auth)
    include_tasks: "tasks/cloud-setup/{{ cloud_provider }}.yaml"

  - name: Enable mouse scrolling for tmux
    lineinfile:
      path: "{{ home_dir }}/.tmux.conf"
      line: "set -g mouse on"
      create: yes
      state: present

  - name: Create VNC User
    ansible.builtin.user:
      name: vncuser
    become: true

  - name: Listen for vnc server on port 5999
    ansible.builtin.lineinfile:
      path: /etc/tigervnc/vncserver.users
      insertafter: EOF
      line: ":99=vncuser"
    become: true

  - name: Gather service facts for firewalld check
    ansible.builtin.service_facts:
    become: true

  - name: Open VNC port 5999 in firewalld
    ansible.posix.firewalld:
      port: 5999/tcp
      permanent: true
      immediate: true
      state: enabled
    become: true
    when: ansible_facts.services['firewalld.service'] is defined
          and ansible_facts.services['firewalld.service'].state == 'running'

  - name: Check if tarballs already exist
    stat:
      path: "{{ home_dir }}/{{ item | basename }}"
    loop: "{{ tarballs }}"
    register: tarball_stats

  - name: Get the OC, openshift-install, and ccoctl Tarballs
    get_url:
      url: "{{ item.item }}"
      dest: "{{ home_dir }}/{{ item.item | basename }}"
    loop: "{{ tarball_stats.results }}"
    loop_control:
      label: "{{ item.item | basename }}"
    when: not item.stat.exists

  - name: Unarchive Downloaded Tarballs
    unarchive:
      src: "{{ home_dir }}/{{ item }}"
      dest: "{{ home_dir }}/"
      remote_src: yes
    loop: "{{ tarball_basenames }}"

  - name: Copy CLI binaries to /usr/bin
    copy:
      src: "{{ home_dir }}/{{ item }}"
      dest: "/usr/bin/{{ item }}"
      remote_src: yes
      mode: 0755
    loop: "{{ cli_binaries }}"
    become: yes

  - name: Copy pull secret
    copy:
      dest: "{{ home_dir }}/pull-secret.txt"
      content: "{{ pull_secret }}"

  - name: Create .docker Directory
    file:
      path: "{{ home_dir }}/.docker"
      state: directory

  - name: Copy pull secret to .docker directory
    copy:
      src: "{{ home_dir }}/pull-secret.txt"
      dest: "{{ home_dir }}/.docker/config.json"
      remote_src: yes

  - name: Check if cco-dir already exists
    stat:
      path: "{{ cco_dir }}/manifests"
    register: cco_dir_check

  - name: Check if install-dir already exists
    stat:
      path: "{{ home_dir }}/install-dir/manifests"
    register: install_dir_check
    
  - name: Create credentials directory
    file:
      path: "{{ item }}"
      state: directory
    loop:
      - "{{ home_dir }}/install-dir"
      - "{{ home_dir }}/install-dir-public"
      - "{{ cco_dir }}"

  - name: Cloud-specific CCO/STS creation
    include_tasks: "tasks/cco/{{ cloud_provider }}.yaml"
    when: not cco_dir_check.stat.exists

  - name: Copy install-config.yaml
    template:
      src: "{{ cloud_provider }}/{{ item }}.j2"
      dest: "{{ home_dir }}/{{ item }}"
    loop:
      - install-config.yaml
      - install-config-public.yaml
      - create-self-managed-hcp.sh

  - name: Render HCP cluster manifests
    ansible.builtin.template:
      src: "{{ cloud_provider }}/hosted-cluster-hcp.yaml.j2"
      dest: "{{ home_dir }}/hosted-cluster-{{ hcp_suffix }}.yaml"
    loop: "{{ hcp_cluster_suffixes }}"
    loop_control:
      loop_var: hcp_suffix
    when: hcp_cluster_suffixes is defined

  - name: Copy install-config into install directories
    copy:
      src: "{{ home_dir }}/{{ item.src }}"
      dest: "{{ home_dir }}/{{ item.dest }}/install-config.yaml"
      remote_src: yes
      mode: 0644
    loop:
      - { src: install-config.yaml, dest: install-dir }
      - { src: install-config-public.yaml, dest: install-dir-public }
    when: not install_dir_check.stat.exists

  - name: Generate Manifests
    shell: |
      openshift-install create manifests --dir {{ home_dir }}/{{ item.dir }}
    loop:
      - { dir: install-dir }
      - { dir: install-dir-public }
    environment: "{{ cloud_env }}"
    when: not install_dir_check.stat.exists

  - name: Copy CCO credentials to install-dir/manifests
    copy:
      src: "{{ cco_dir }}/manifests/"
      dest: "{{ home_dir }}/{{ item.dir }}/manifests/"
      remote_src: yes
    loop:
      - { dir: install-dir }
      - { dir: install-dir-public }
    when: not install_dir_check.stat.exists

  - name: Copy CCO tls files to install-dir/
    copy:
      src: "{{ cco_dir }}/tls"
      dest: "{{ home_dir }}/{{ item.dir }}/"
      remote_src: yes
    loop:
      - { dir: install-dir }
      - { dir: install-dir-public }
    when: not install_dir_check.stat.exists

  - name: Take a backup of the install-dir
    community.general.archive:
      path: "{{ home_dir }}/{{ item.dir }}"
      dest: "{{ home_dir }}/{{ item.dir }}-backup.bz2"
      format: bz2
    loop:
      - { dir: install-dir }
      - { dir: install-dir-public }