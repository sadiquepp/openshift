- name: Check if VG has free space to grow
  shell: |
    FREE=$(vgs --noheadings -o vg_free --units m rootvg | tr -d ' mM.')
    [ "${FREE%%,*}" -gt 0 ] 2>/dev/null && echo "grow" || echo "skip"
  register: lv_grow_check
  become: true
  changed_when: false

- name: Expand partition and LVs to use full OS disk
  shell: |
    PV=$(pvs --noheadings -o pv_name | head -1 | tr -d ' ')
    PART_NUM=$(echo "$PV" | grep -oE '[0-9]+$')
    DISK=$(echo "$PV" | sed "s/${PART_NUM}$//")
    growpart "$DISK" "$PART_NUM" || true
    pvresize "$PV"
    lvextend -r -L +5G  /dev/rootvg/rootlv || true
    lvextend -r -L +3G  /dev/rootvg/tmplv  || true
    lvextend -r -L +20G /dev/rootvg/varlv  || true
    lvextend -r -l +100%FREE /dev/rootvg/homelv || true
  become: true
  when: lv_grow_check.stdout == "grow"

- name: Add Azure CLI Yum Repo
  copy:
    dest: /etc/yum.repos.d/azure-cli.repo
    content: |
      [azure-cli]
      name=Azure CLI
      baseurl=https://packages.microsoft.com/yumrepos/azure-cli
      enabled=1
      gpgcheck=1
      gpgkey=https://packages.microsoft.com/keys/microsoft.asc
  become: true

- name: Install Azure CLI
  dnf:
    name: azure-cli
    state: present
  become: true

- name: Create .azure directory
  file:
    path: "{{ home_dir }}/.azure"
    state: directory

- name: Write osServicePrincipal.json for openshift-install
  copy:
    dest: "{{ home_dir }}/.azure/osServicePrincipal.json"
    mode: "0600"
    content: |
      {
        "subscriptionId": "{{ azure_subscription_id }}",
        "clientId": "{{ installer_sp_client_id }}",
        "clientSecret": "{{ installer_sp_client_secret }}",
        "tenantId": "{{ azure_tenant_id }}"
      }
